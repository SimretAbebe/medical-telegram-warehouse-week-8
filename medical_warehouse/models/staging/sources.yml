version: 2

sources:
  - name: raw
    description: "Raw data loaded from Telegram scraper JSON files"
    schema: raw
    tables:
      - name: telegram_messages
        description: "Raw Telegram messages from Ethiopian medical channels"

      - name: image_detections
        description: "YOLO object detection results for downloaded images"
        columns:
          - name: message_id
            description: "Telegram message ID the image belongs to"
          - name: channel_name
            description: "Channel the image came from"
          - name: class_name
            description: "Object detected by YOLO e.g. bottle, person"
          - name: confidence
            description: "How confident YOLO is — 0.0 to 1.0"
          - name: image_category
            description: "promotional, product_display, lifestyle, or other"